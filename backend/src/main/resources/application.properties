spring.application.name=crn-lab-backend

server.port=8080

# Use H2 by default for local development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console


spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true
server.error.include-message=always

app.jwt.secret=${APP_JWT_SECRET:dev-secret-key-at-least-32-characters-long-for-local-testing}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION:86400000}
